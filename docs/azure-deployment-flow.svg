<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">LatticePolicy Azure Deployment Flow</title>
  <desc id="desc">Azure deployment flow for LatticePolicy using GitHub Actions, Azure Container Registry, Azure Container Apps, PostgreSQL Flexible Server, Azure Cache for Redis, Key Vault, and Azure Monitor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#002050"/>
      <stop offset="100%" stop-color="#0078d4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10.5" refY="4.5" orient="auto">
      <path d="M0 0 L12 4.5 L0 9 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 36px Arial, sans-serif; fill: #fff; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #dbeafe; }
      .section { font: 800 16px Arial, sans-serif; fill: #111827; letter-spacing: .02em; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 500 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 10px Arial, sans-serif; fill: #64748b; letter-spacing: .08em; }
      .lane { fill: #fff; stroke: #dbeafe; stroke-width: 1.3; rx: 20; ry: 20; filter: url(#shadow); }
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; ry: 14; }
      .az { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.3; rx: 14; ry: 14; }
      .data { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.3; rx: 14; ry: 14; }
      .sec { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.3; rx: 14; ry: 14; }
      .edge { fill: #f0f9ff; stroke: #38bdf8; stroke-width: 1.3; rx: 14; ry: 14; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
      .flow { font: 700 11px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="42" y="34" width="1516" height="106" rx="28" fill="url(#header)" filter="url(#shadow)"/>
  <text x="78" y="82" class="title">Azure Deployment Flow</text>
  <text x="78" y="112" class="subtitle">LatticePolicy on Azure Container Registry, Container Apps, PostgreSQL Flexible Server, Azure Cache for Redis, Key Vault, and Monitor</text>
  <text x="1300" y="82" class="subtitle">Serverless containers</text>
  <text x="1300" y="108" class="subtitle">Managed data services</text>

  <rect x="60" y="180" width="370" height="220" class="lane"/>
  <text x="88" y="214" class="section">1. SOURCE AND CI/CD</text>
  <rect x="88" y="242" width="145" height="58" class="card"/>
  <text x="108" y="267" class="label">GitHub</text>
  <text x="108" y="288" class="small">PR, review, protected main</text>
  <rect x="258" y="242" width="145" height="58" class="card"/>
  <text x="278" y="267" class="label">Actions</text>
  <text x="278" y="288" class="small">build, test, typecheck</text>
  <rect x="88" y="320" width="315" height="58" class="az"/>
  <text x="108" y="345" class="label">Build Containers</text>
  <text x="108" y="366" class="small">API image + UI image tagged by version and Git SHA</text>

  <rect x="500" y="180" width="360" height="220" class="lane"/>
  <text x="528" y="214" class="section">2. IMAGE REGISTRY</text>
  <rect x="538" y="252" width="284" height="78" class="az"/>
  <text x="558" y="281" class="label">Azure Container Registry</text>
  <text x="558" y="304" class="small">lattice-policy-api</text>
  <text x="558" y="324" class="small">lattice-policy-ui</text>

  <rect x="930" y="180" width="610" height="220" class="lane"/>
  <text x="958" y="214" class="section">3. PUBLIC ENTRY POINT</text>
  <rect x="958" y="250" width="206" height="72" class="edge"/>
  <text x="978" y="279" class="label">Azure Front Door</text>
  <text x="978" y="301" class="small">optional WAF and routing</text>
  <rect x="1202" y="250" width="206" height="72" class="edge"/>
  <text x="1222" y="279" class="label">Custom Domains</text>
  <text x="1222" y="301" class="small">TLS certificates</text>
  <rect x="1090" y="342" width="296" height="42" class="edge"/>
  <text x="1114" y="369" class="label">Container Apps Ingress</text>
  <text x="1312" y="369" class="small">HTTPS endpoints</text>

  <rect x="60" y="450" width="900" height="300" class="lane"/>
  <text x="88" y="484" class="section">4. AZURE CONTAINER APPS</text>
  <text x="88" y="510" class="small">Container Apps revisions run API and UI independently with scaling, logs, and rollback support.</text>
  <rect x="88" y="548" width="250" height="96" class="az"/>
  <text x="112" y="579" class="label">Frontend App</text>
  <text x="112" y="602" class="small">Nginx static app</text>
  <text x="112" y="622" class="small">target port 80</text>
  <rect x="386" y="548" width="250" height="96" class="az"/>
  <text x="410" y="579" class="label">API App</text>
  <text x="410" y="602" class="small">Node.js / Express</text>
  <text x="410" y="622" class="small">target port 3000</text>
  <rect x="684" y="548" width="230" height="96" class="az"/>
  <text x="708" y="579" class="label">Job / Revision</text>
  <text x="708" y="602" class="small">database migrations</text>
  <text x="708" y="622" class="small">release utilities</text>
  <rect x="88" y="674" width="826" height="42" class="edge"/>
  <text x="112" y="701" class="label">Container Apps Environment</text>
  <text x="342" y="701" class="small">network boundary, scaling, revision management, log integration</text>

  <rect x="1010" y="450" width="530" height="300" class="lane"/>
  <text x="1038" y="484" class="section">5. DATA, SECRETS, AND OBSERVABILITY</text>
  <rect x="1038" y="528" width="210" height="70" class="data"/>
  <text x="1060" y="556" class="label">PostgreSQL Flexible</text>
  <text x="1060" y="578" class="small">managed policy database</text>
  <rect x="1280" y="528" width="210" height="70" class="data"/>
  <text x="1302" y="556" class="label">Azure Cache Redis</text>
  <text x="1302" y="578" class="small">read-through cache</text>
  <rect x="1038" y="626" width="210" height="70" class="sec"/>
  <text x="1060" y="654" class="label">Key Vault</text>
  <text x="1060" y="676" class="small">JWT, DB, Redis, MFA</text>
  <rect x="1280" y="626" width="210" height="70" class="card"/>
  <text x="1302" y="654" class="label">Azure Monitor</text>
  <text x="1302" y="676" class="small">logs, metrics, alerts</text>

  <rect x="60" y="800" width="1480" height="106" class="lane"/>
  <text x="88" y="834" class="section">6. RELEASE FLOW</text>
  <text x="88" y="864" class="small">PR approval and CI pass -> squash merge -> build immutable images -> push to ACR -> run migrations -> deploy Container Apps revisions -> health/smoke test -> promote revision.</text>
  <text x="88" y="888" class="tiny">AZURE HARDENING</text>
  <text x="214" y="888" class="small">Use Key Vault, private access for PostgreSQL/Redis, managed identities, custom domains/TLS, revision rollback, and Azure Monitor alerts.</text>

  <path d="M233 271 L258 271" class="arrow"/>
  <path d="M403 349 L500 292" class="arrow"/>
  <text x="430" y="316" class="flow">push images</text>
  <path d="M822 292 L930 292" class="arrow"/>
  <text x="850" y="278" class="flow">deploy revisions</text>
  <path d="M1238 384 L212 548" class="arrow"/>
  <text x="694" y="452" class="flow">UI traffic</text>
  <path d="M1238 384 L511 548" class="arrow"/>
  <text x="742" y="488" class="flow">API traffic</text>
  <path d="M636 596 L1038 563" class="arrow"/>
  <path d="M636 610 L1280 563" class="arrow dash"/>
  <path d="M636 584 L1038 661" class="arrow"/>
  <path d="M636 624 L1280 661" class="arrow dash"/>
  <path d="M799 548 L1038 563" class="arrow"/>
</svg>
