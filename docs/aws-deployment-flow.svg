<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">LatticePolicy AWS Deployment Flow</title>
  <desc id="desc">AWS deployment flow for LatticePolicy using GitHub Actions, ECR, ECS Fargate, ALB, RDS PostgreSQL, ElastiCache Redis, and Secrets Manager.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232f3e"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-18%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="9" refX="10.5" refY="4.5" orient="auto">
      <path d="M0 0 L12 4.5 L0 9 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 36px Arial, sans-serif; fill: #fff; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #fff7ed; }
      .section { font: 800 16px Arial, sans-serif; fill: #111827; letter-spacing: .02em; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 500 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 10px Arial, sans-serif; fill: #64748b; letter-spacing: .08em; }
      .lane { fill: #fff; stroke: #e2e8f0; stroke-width: 1.3; rx: 20; ry: 20; filter: url(#shadow); }
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; ry: 14; }
      .aws { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.3; rx: 14; ry: 14; }
      .net { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.3; rx: 14; ry: 14; }
      .data { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.3; rx: 14; ry: 14; }
      .sec { fill: #fef2f2; stroke: #fca5a5; stroke-width: 1.3; rx: 14; ry: 14; }
      .arrow { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
      .flow { font: 700 11px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <rect x="42" y="34" width="1516" height="106" rx="28" fill="url(#header)" filter="url(#shadow)"/>
  <text x="78" y="82" class="title">AWS Deployment Flow</text>
  <text x="78" y="112" class="subtitle">LatticePolicy on Amazon ECR, ECS Fargate, Application Load Balancer, RDS PostgreSQL, ElastiCache Redis, and Secrets Manager</text>
  <text x="1308" y="82" class="subtitle">Production path</text>
  <text x="1308" y="108" class="subtitle">Private data plane</text>

  <rect x="60" y="180" width="370" height="220" class="lane"/>
  <text x="88" y="214" class="section">1. SOURCE AND CI/CD</text>
  <rect x="88" y="242" width="145" height="58" class="card"/>
  <text x="108" y="267" class="label">GitHub</text>
  <text x="108" y="288" class="small">PR, review, protected main</text>
  <rect x="258" y="242" width="145" height="58" class="card"/>
  <text x="278" y="267" class="label">Actions</text>
  <text x="278" y="288" class="small">build, test, typecheck</text>
  <rect x="88" y="320" width="315" height="58" class="aws"/>
  <text x="108" y="345" class="label">Build Containers</text>
  <text x="108" y="366" class="small">API image + UI image tagged by version and Git SHA</text>

  <rect x="500" y="180" width="360" height="220" class="lane"/>
  <text x="528" y="214" class="section">2. IMAGE REGISTRY</text>
  <rect x="538" y="252" width="284" height="78" class="aws"/>
  <text x="558" y="281" class="label">Amazon ECR</text>
  <text x="558" y="304" class="small">lattice-policy-api</text>
  <text x="558" y="324" class="small">lattice-policy-ui</text>

  <rect x="930" y="180" width="610" height="220" class="lane"/>
  <text x="958" y="214" class="section">3. PUBLIC ENTRY POINT</text>
  <rect x="958" y="250" width="170" height="72" class="net"/>
  <text x="978" y="279" class="label">Route 53</text>
  <text x="978" y="301" class="small">DNS records</text>
  <rect x="1168" y="250" width="170" height="72" class="net"/>
  <text x="1188" y="279" class="label">ACM</text>
  <text x="1188" y="301" class="small">TLS certificate</text>
  <rect x="1094" y="342" width="296" height="42" class="net"/>
  <text x="1118" y="369" class="label">Application Load Balancer</text>
  <text x="1322" y="369" class="small">HTTPS routing</text>

  <rect x="60" y="450" width="900" height="300" class="lane"/>
  <text x="88" y="484" class="section">4. ECS FARGATE APPLICATION SERVICES</text>
  <text x="88" y="510" class="small">Tasks run in private subnets. ALB target groups route traffic to each service.</text>
  <rect x="88" y="548" width="250" height="96" class="aws"/>
  <text x="112" y="579" class="label">Frontend Service</text>
  <text x="112" y="602" class="small">Nginx static app</text>
  <text x="112" y="622" class="small">container port 80</text>
  <rect x="386" y="548" width="250" height="96" class="aws"/>
  <text x="410" y="579" class="label">API Service</text>
  <text x="410" y="602" class="small">Node.js / Express</text>
  <text x="410" y="622" class="small">container port 3000</text>
  <rect x="684" y="548" width="230" height="96" class="aws"/>
  <text x="708" y="579" class="label">One-Off Tasks</text>
  <text x="708" y="602" class="small">database migrations</text>
  <text x="708" y="622" class="small">release utilities</text>
  <rect x="88" y="674" width="826" height="42" class="net"/>
  <text x="112" y="701" class="label">VPC private subnets + security groups</text>
  <text x="392" y="701" class="small">only ALB is public; data services are private</text>

  <rect x="1010" y="450" width="530" height="300" class="lane"/>
  <text x="1038" y="484" class="section">5. DATA, SECRETS, AND OBSERVABILITY</text>
  <rect x="1038" y="528" width="210" height="70" class="data"/>
  <text x="1060" y="556" class="label">RDS PostgreSQL</text>
  <text x="1060" y="578" class="small">policy system of record</text>
  <rect x="1280" y="528" width="210" height="70" class="data"/>
  <text x="1302" y="556" class="label">ElastiCache Redis</text>
  <text x="1302" y="578" class="small">read-through cache</text>
  <rect x="1038" y="626" width="210" height="70" class="sec"/>
  <text x="1060" y="654" class="label">Secrets Manager</text>
  <text x="1060" y="676" class="small">JWT, DB, Redis, MFA</text>
  <rect x="1280" y="626" width="210" height="70" class="card"/>
  <text x="1302" y="654" class="label">CloudWatch</text>
  <text x="1302" y="676" class="small">logs, metrics, alarms</text>

  <rect x="60" y="800" width="1480" height="106" class="lane"/>
  <text x="88" y="834" class="section">6. RELEASE FLOW</text>
  <text x="88" y="864" class="small">PR approval and CI pass -> squash merge -> build immutable images -> push to ECR -> run migrations -> update ECS services -> ALB health checks -> smoke test /health and UI workflows.</text>
  <text x="88" y="888" class="tiny">AWS HARDENING</text>
  <text x="202" y="888" class="small">Use private subnets, least-privilege task roles, Secrets Manager, RDS backups/deletion protection, ACM TLS, and CloudWatch alarms.</text>

  <path d="M233 271 L258 271" class="arrow"/>
  <path d="M403 349 L500 292" class="arrow"/>
  <text x="430" y="316" class="flow">push images</text>
  <path d="M822 292 L930 292" class="arrow"/>
  <text x="850" y="278" class="flow">deploy revisions</text>
  <path d="M1242 384 L212 548" class="arrow"/>
  <text x="694" y="452" class="flow">/*</text>
  <path d="M1242 384 L511 548" class="arrow"/>
  <text x="742" y="488" class="flow">/api/*</text>
  <path d="M636 596 L1038 563" class="arrow"/>
  <path d="M636 610 L1280 563" class="arrow dash"/>
  <path d="M636 584 L1038 661" class="arrow"/>
  <path d="M636 624 L1280 661" class="arrow dash"/>
  <path d="M799 548 L1038 563" class="arrow"/>
</svg>
