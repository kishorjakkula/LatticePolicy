<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
  <title id="title">LatticePolicy Component Architecture</title>
  <desc id="desc">Component-level architecture for the LatticePolicy multi-tenant policy administration framework.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fc"/>
      <stop offset="100%" stop-color="#edf3fb"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#12305a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="9" refX="10.5" refY="4.5" orient="auto">
      <path d="M0 0 L12 4.5 L0 9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="9" refX="10.5" refY="4.5" orient="auto">
      <path d="M0 0 L12 4.5 L0 9 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowSlate" markerWidth="12" markerHeight="9" refX="10.5" refY="4.5" orient="auto">
      <path d="M0 0 L12 4.5 L0 9 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 38px Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #dbeafe; }
      .section { font: 800 18px Arial, sans-serif; fill: #0f172a; letter-spacing: .02em; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 500 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 10px Arial, sans-serif; fill: #64748b; letter-spacing: .08em; }
      .whiteSmall { font: 600 12px Arial, sans-serif; fill: #dbeafe; }
      .lane { fill: #ffffff; stroke: #d7e2f2; stroke-width: 1.3; rx: 22; ry: 22; filter: url(#shadow); }
      .cardBlue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.2; rx: 14; ry: 14; }
      .cardGreen { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.2; rx: 14; ry: 14; }
      .cardAmber { fill: #fffbeb; stroke: #facc15; stroke-width: 1.2; rx: 14; ry: 14; }
      .cardRose { fill: #fff1f2; stroke: #fda4af; stroke-width: 1.2; rx: 14; ry: 14; }
      .cardSlate { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 14; ry: 14; }
      .pill { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 999; ry: 999; }
      .db { fill: #eefdf5; stroke: #34d399; stroke-width: 1.5; }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.2; fill: none; marker-end: url(#arrowBlue); }
      .arrowGreen { stroke: #0f766e; stroke-width: 2.2; fill: none; marker-end: url(#arrowGreen); }
      .arrowSlate { stroke: #475569; stroke-width: 1.8; fill: none; marker-end: url(#arrowSlate); }
      .dash { stroke-dasharray: 7 6; }
      .flowText { font: 700 11px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1800" height="1180" fill="url(#page)"/>

  <rect x="42" y="34" width="1716" height="112" rx="28" fill="url(#header)" filter="url(#shadow)"/>
  <rect x="72" y="58" width="64" height="64" rx="16" fill="#ffffff" opacity="0.96"/>
  <path d="M89 75L119 105M119 75L89 105M104 69V111M83 90H125" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
  <circle cx="89" cy="75" r="5" fill="#0f766e"/>
  <circle cx="119" cy="75" r="5" fill="#2563eb"/>
  <circle cx="89" cy="105" r="5" fill="#2563eb"/>
  <circle cx="119" cy="105" r="5" fill="#0f766e"/>
  <circle cx="104" cy="90" r="6" fill="#0f172a"/>
  <text x="158" y="83" class="title">LatticePolicy Component Architecture</text>
  <text x="158" y="113" class="subtitle">Property and casualty insurance policy underwriting system with one access-based portal and operations architecture</text>
  <text x="1466" y="78" class="whiteSmall">React + Express + PostgreSQL + Redis</text>
  <text x="1466" y="104" class="whiteSmall">Docker local stack | AWS ECS-ready</text>

  <rect x="62" y="184" width="1676" height="150" class="lane"/>
  <text x="92" y="218" class="section">1. ACCESS EXPERIENCES</text>
  <text x="92" y="244" class="small">One framework shell, different routes and data projections by tenant, role, permission, and customer identity link.</text>
  <rect x="92" y="266" width="220" height="46" class="pill"/>
  <text x="116" y="294" class="label">Admin</text>
  <text x="184" y="294" class="small">tenant, users, forms</text>
  <rect x="334" y="266" width="220" height="46" class="pill"/>
  <text x="358" y="294" class="label">Underwriter</text>
  <text x="470" y="294" class="small">referrals, review</text>
  <rect x="576" y="266" width="220" height="46" class="pill"/>
  <text x="600" y="294" class="label">Agent</text>
  <text x="660" y="294" class="small">quote, bind, service</text>
  <rect x="818" y="266" width="220" height="46" class="pill"/>
  <text x="842" y="294" class="label">Actuary</text>
  <text x="922" y="294" class="small">rating models</text>
  <rect x="1060" y="266" width="258" height="46" class="pill"/>
  <text x="1084" y="294" class="label">Policyholder</text>
  <text x="1204" y="294" class="small">portal-safe views</text>
  <rect x="1370" y="252" width="318" height="74" class="cardBlue"/>
  <text x="1394" y="279" class="label">Access Controls</text>
  <text x="1394" y="301" class="small">Tenant scope + RBAC + permission routes</text>
  <text x="1394" y="319" class="small">Customer-policy links + safe projections</text>

  <rect x="62" y="374" width="506" height="264" class="lane"/>
  <text x="92" y="408" class="section">2. FRONTEND APPLICATION</text>
  <text x="92" y="434" class="small">React 18, TypeScript, Vite, TanStack Query, permission-gated route tree.</text>
  <rect x="92" y="466" width="204" height="66" class="cardBlue"/>
  <text x="112" y="493" class="label">App Shell</text>
  <text x="112" y="515" class="small">top nav, auth context, tenant context</text>
  <rect x="318" y="466" width="204" height="66" class="cardBlue"/>
  <text x="338" y="493" class="label">Operational UI</text>
  <text x="338" y="515" class="small">dashboard, search, wizard, policy</text>
  <rect x="92" y="552" width="204" height="66" class="cardBlue"/>
  <text x="112" y="579" class="label">Admin Workbench</text>
  <text x="112" y="601" class="small">users, tenant, security, forms</text>
  <rect x="318" y="552" width="204" height="66" class="cardBlue"/>
  <text x="338" y="579" class="label">Customer Portal</text>
  <text x="338" y="601" class="small">my policies, declarations, ID cards</text>

  <rect x="628" y="374" width="1110" height="264" class="lane"/>
  <text x="658" y="408" class="section">3. API, SECURITY, AND DOMAIN SERVICES</text>
  <text x="658" y="434" class="small">Node.js 20 + Express API with OpenAPI documentation, tenant isolation, JWT auth, optional TOTP MFA, and service boundaries.</text>
  <rect x="658" y="466" width="190" height="66" class="cardRose"/>
  <text x="678" y="493" class="label">Auth Boundary</text>
  <text x="678" y="515" class="small">JWT, RBAC, MFA, route guards</text>
  <rect x="870" y="466" width="190" height="66" class="cardGreen"/>
  <text x="890" y="493" class="label">Policy Lifecycle</text>
  <text x="890" y="515" class="small">quote, bind, issue, endorse</text>
  <rect x="1082" y="466" width="190" height="66" class="cardGreen"/>
  <text x="1102" y="493" class="label">Rating Engine</text>
  <text x="1102" y="515" class="small">rules, tables, published models</text>
  <rect x="1294" y="466" width="190" height="66" class="cardGreen"/>
  <text x="1314" y="493" class="label">Documents</text>
  <text x="1314" y="515" class="small">forms, packets, worksheets</text>
  <rect x="1506" y="466" width="190" height="66" class="cardGreen"/>
  <text x="1526" y="493" class="label">Customer APIs</text>
  <text x="1526" y="515" class="small">linked-customer safe reads</text>
  <rect x="658" y="552" width="190" height="66" class="cardGreen"/>
  <text x="678" y="579" class="label">Admin Services</text>
  <text x="678" y="601" class="small">tenant, users, forms, security</text>
  <rect x="870" y="552" width="190" height="66" class="cardGreen"/>
  <text x="890" y="579" class="label">UW Workflow</text>
  <text x="890" y="601" class="small">referrals, queues, actions</text>
  <rect x="1082" y="552" width="190" height="66" class="cardGreen"/>
  <text x="1102" y="579" class="label">AI / ML Insights</text>
  <text x="1102" y="601" class="small">risk, fraud, adequacy, audit</text>
  <rect x="1294" y="552" width="190" height="66" class="cardGreen"/>
  <text x="1314" y="579" class="label">Notification Port</text>
  <text x="1314" y="601" class="small">email templates, delivery status</text>
  <rect x="1506" y="552" width="190" height="66" class="cardGreen"/>
  <text x="1526" y="579" class="label">OpenAPI</text>
  <text x="1526" y="601" class="small">admin-only Swagger access</text>

  <rect x="62" y="678" width="506" height="230" class="lane"/>
  <text x="92" y="712" class="section">4. EXTENSION MODEL</text>
  <text x="92" y="738" class="small">Carrier-specific behavior is added through product packs, tenant configuration, and adapter ports.</text>
  <rect x="92" y="770" width="204" height="56" class="cardAmber"/>
  <text x="112" y="795" class="label">Product Packs</text>
  <text x="112" y="815" class="small">coverage + rating YAML</text>
  <rect x="318" y="770" width="204" height="56" class="cardAmber"/>
  <text x="338" y="795" class="label">Tenant Overrides</text>
  <text x="338" y="815" class="small">rules, forms, preferences</text>
  <rect x="92" y="846" width="204" height="56" class="cardAmber"/>
  <text x="112" y="871" class="label">Adapter Ports</text>
  <text x="112" y="891" class="small">payments, data, documents</text>
  <rect x="318" y="846" width="204" height="56" class="cardAmber"/>
  <text x="338" y="871" class="label">Published Raters</text>
  <text x="338" y="891" class="small">actuarial workbook models</text>

  <rect x="628" y="678" width="688" height="230" class="lane"/>
  <text x="658" y="712" class="section">5. PERSISTENCE AND READ PERFORMANCE</text>
  <text x="658" y="738" class="small">Tenant-scoped system of record plus Redis read-through caching for high-read operational endpoints.</text>
  <ellipse cx="820" cy="812" rx="160" ry="62" class="db"/>
  <text x="728" y="795" class="label">PostgreSQL 15</text>
  <text x="708" y="817" class="small">policies, quotes, customers, forms</text>
  <text x="706" y="837" class="small">RBAC, transactions, outbox, AI events</text>
  <rect x="1020" y="760" width="236" height="72" class="cardSlate"/>
  <text x="1042" y="789" class="label">Redis Cache</text>
  <text x="1042" y="811" class="small">read-through cache + invalidation</text>
  <rect x="1020" y="848" width="236" height="42" class="cardSlate"/>
  <text x="1042" y="875" class="label">SQL Migrations</text>

  <rect x="1358" y="678" width="380" height="230" class="lane"/>
  <text x="1388" y="712" class="section">6. ASYNC AND INTEGRATIONS</text>
  <text x="1388" y="738" class="small">Outbox-backed event delivery and pluggable external service adapters.</text>
  <rect x="1388" y="770" width="150" height="56" class="cardRose"/>
  <text x="1408" y="795" class="label">Outbox Worker</text>
  <text x="1408" y="815" class="small">retry + backoff</text>
  <rect x="1558" y="770" width="150" height="56" class="cardRose"/>
  <text x="1578" y="795" class="label">Webhooks</text>
  <text x="1578" y="815" class="small">downstream events</text>
  <rect x="1388" y="846" width="150" height="56" class="cardRose"/>
  <text x="1408" y="871" class="label">Email Provider</text>
  <text x="1408" y="891" class="small">SES / SMTP / API</text>
  <rect x="1558" y="846" width="150" height="56" class="cardRose"/>
  <text x="1578" y="871" class="label">3rd Party Data</text>
  <text x="1578" y="891" class="small">adapter-backed</text>

  <rect x="62" y="948" width="1676" height="144" class="lane"/>
  <text x="92" y="982" class="section">7. PLATFORM OPERATIONS</text>
  <text x="92" y="1008" class="small">Local Docker deployment, production reverse proxy, CI/CD examples, and observability hooks.</text>
  <rect x="92" y="1034" width="248" height="42" class="cardSlate"/>
  <text x="114" y="1061" class="label">Docker Compose</text>
  <text x="236" y="1061" class="small">ui, api, db, cache</text>
  <rect x="370" y="1034" width="248" height="42" class="cardSlate"/>
  <text x="392" y="1061" class="label">Nginx</text>
  <text x="452" y="1061" class="small">SPA hosting + API proxy</text>
  <rect x="648" y="1034" width="248" height="42" class="cardSlate"/>
  <text x="670" y="1061" class="label">GitHub Actions</text>
  <text x="800" y="1061" class="small">CI + ECS deploy</text>
  <rect x="926" y="1034" width="248" height="42" class="cardSlate"/>
  <text x="948" y="1061" class="label">Observability</text>
  <text x="1062" y="1061" class="small">Pino, Loki, Grafana</text>
  <rect x="1204" y="1034" width="248" height="42" class="cardSlate"/>
  <text x="1226" y="1061" class="label">Security Baseline</text>
  <text x="1370" y="1061" class="small">secrets externalized</text>
  <rect x="1482" y="1034" width="226" height="42" class="cardSlate"/>
  <text x="1504" y="1061" class="label">Open Source Ready</text>
  <text x="1640" y="1061" class="small">Apache 2.0</text>

  <path d="M1350 289 L1370 289" class="arrowBlue"/>
  <text x="1325" y="274" class="flowText">auth context</text>
  <path d="M315 334 L315 374" class="arrowBlue"/>
  <text x="326" y="358" class="flowText">route by permission</text>
  <path d="M568 506 L628 506" class="arrowBlue"/>
  <text x="576" y="492" class="flowText">REST + JWT + X-Tenant</text>
  <path d="M1182 638 L1182 678" class="arrowGreen"/>
  <text x="1194" y="664" class="flowText">SQL / cache</text>
  <path d="M1316 792 L1358 792" class="arrowSlate"/>
  <text x="1318" y="778" class="flowText">events</text>
  <path d="M1538 798 L1558 798" class="arrowSlate"/>
  <path d="M1484 846 L1484 828" class="arrowSlate"/>
  <text x="1458" y="837" class="flowText">notify</text>
  <path d="M568 792 L628 792" class="arrowGreen dash"/>
  <text x="574" y="778" class="flowText">config load</text>
  <path d="M1182 908 L1182 948" class="arrowGreen"/>
  <text x="1194" y="934" class="flowText">runtime stack</text>
  <path d="M312 908 L312 948" class="arrowGreen"/>
  <text x="324" y="934" class="flowText">deploy artifacts</text>

  <line x1="92" y1="1130" x2="1708" y2="1130" stroke="#cbd5e1" stroke-width="1"/>
  <text x="92" y="1154" class="tiny">KEY PRINCIPLE</text>
  <text x="208" y="1154" class="small">Portal is an access pattern, not a separate product: the same policy domain is exposed through constrained identity links, permissions, routes, and data projections.</text>
</svg>
