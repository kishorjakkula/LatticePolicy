<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2a44; }
      .subtitle { font: 500 14px Arial, sans-serif; fill: #5c6b84; }
      .label { font: 600 14px Arial, sans-serif; fill: #1f2a44; }
      .small { font: 500 12px Arial, sans-serif; fill: #33415c; }
      .box { fill: #f8fbff; stroke: #9bb8e8; stroke-width: 1.5; rx: 12; ry: 12; }
      .module { fill: #eef5ff; stroke: #86a9e6; stroke-width: 1.2; rx: 10; ry: 10; }
      .db { fill: #eaf7ef; stroke: #7bbf92; stroke-width: 1.5; }
      .cfg { fill: #fff7ea; stroke: #e3b67a; stroke-width: 1.2; rx: 10; ry: 10; }
      .batch { fill: #f2f8f5; stroke: #7bbf92; stroke-width: 1.3; rx: 10; ry: 10; }
      .arrow { stroke: #4f6ea8; stroke-width: 2; fill: none; marker-end: url(#arrowHead); }
      .arrow2 { stroke: #6f8a64; stroke-width: 2; fill: none; marker-end: url(#arrowHeadGreen); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f6ea8"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6f8a64"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1120" fill="#ffffff"/>

  <text x="40" y="48" class="title">LatticePolicy - Current Architecture</text>
  <text x="40" y="72" class="subtitle">Frontend + API + Postgres + Redis cache + AI/ML inference + config + documents + batch jobs + email + async outbox + optional TOTP MFA</text>

  <!-- Browser -->
  <rect x="60" y="140" width="230" height="90" class="box"/>
  <text x="80" y="172" class="label">User Browser</text>
  <text x="80" y="196" class="small">Agent / UW / Admin UI</text>

  <!-- Frontend -->
  <rect x="360" y="120" width="360" height="130" class="box"/>
  <text x="385" y="155" class="label">Frontend (policy-ui :5173)</text>
  <text x="385" y="180" class="small">React 18 + TypeScript + Vite</text>
  <text x="385" y="202" class="small">Wizard, Search, Policy View, Admin</text>
  <text x="385" y="224" class="small">Client PDF: jsPDF</text>

  <!-- API -->
  <rect x="800" y="95" width="620" height="360" class="box"/>
  <text x="825" y="130" class="label">Backend API (policy-api :3300)</text>
  <text x="825" y="153" class="small">Node.js 20 + Express + TypeScript</text>
  <text x="825" y="174" class="small">JWT auth + tenant isolation (X-Tenant) + RBAC + optional TOTP MFA</text>

  <!-- API modules -->
  <rect x="825" y="195" width="180" height="70" class="module"/>
  <text x="840" y="222" class="label">Auth + RBAC + MFA</text>
  <text x="840" y="242" class="small">JWT, roles, TOTP verify</text>

  <rect x="1020" y="195" width="180" height="70" class="module"/>
  <text x="1035" y="222" class="label">Workflow</text>
  <text x="1035" y="242" class="small">Quote/Bind/Issue/Txns</text>

  <rect x="1215" y="195" width="180" height="70" class="module"/>
  <text x="1230" y="222" class="label">Rating Engine</text>
  <text x="1230" y="242" class="small">premium calculations</text>

  <rect x="825" y="285" width="180" height="70" class="module"/>
  <text x="840" y="312" class="label">Forms Admin</text>
  <text x="840" y="332" class="small">catalog + rules + preview</text>

  <rect x="1020" y="285" width="180" height="70" class="module"/>
  <text x="1035" y="312" class="label">Documents</text>
  <text x="1035" y="332" class="small">form/document endpoints</text>

  <rect x="1215" y="285" width="180" height="70" class="module"/>
  <text x="1230" y="312" class="label">Tenant Prefs</text>
  <text x="1230" y="332" class="small">date/policy number format</text>

  <rect x="825" y="375" width="180" height="70" class="module"/>
  <text x="840" y="402" class="label">Notifications</text>
  <text x="840" y="422" class="small">email templates + send</text>

  <rect x="1020" y="375" width="180" height="70" class="module"/>
  <text x="1035" y="402" class="label">AI / ML Inference</text>
  <text x="1035" y="422" class="small">risk/fraud/premium insights</text>

  <!-- DB -->
  <ellipse cx="1040" cy="520" rx="210" ry="65" class="db"/>
  <text x="940" y="512" class="label">PostgreSQL 15 (policy-db :65432)</text>
  <text x="905" y="535" class="small">quotes (+ai_insights), policies, versions, ratings, forms admin, RBAC, users, async_message_outbox, ai_inference_events</text>

  <!-- Cache -->
  <rect x="820" y="585" width="220" height="70" class="cfg"/>
  <text x="845" y="615" class="label">Redis Cache</text>
  <text x="845" y="636" class="small">read-through + invalidation</text>

  <!-- Migrations -->
  <rect x="1265" y="470" width="180" height="90" class="cfg"/>
  <text x="1285" y="505" class="label">SQL Migrations</text>
  <text x="1285" y="528" class="small">server/migrations</text>

  <!-- Config blocks -->
  <rect x="260" y="430" width="280" height="105" class="cfg"/>
  <text x="280" y="462" class="label">Product Config</text>
  <text x="280" y="486" class="small">products/personal-auto/*.yaml</text>
  <text x="280" y="508" class="small">products/homeowners/*.yaml</text>

  <rect x="260" y="570" width="280" height="110" class="cfg"/>
  <text x="280" y="602" class="label">Tenant Config</text>
  <text x="280" y="626" class="small">tenants/sample-carrier/config.yaml</text>
  <text x="280" y="648" class="small">field metadata + overrides</text>

  <!-- Email provider -->
  <rect x="60" y="300" width="230" height="95" class="cfg"/>
  <text x="80" y="332" class="label">Email Provider</text>
  <text x="80" y="356" class="small">AWS SES / SMTP / API</text>
  <text x="80" y="378" class="small">delivery + bounce status</text>

  <!-- Docs output -->
  <rect x="820" y="670" width="300" height="120" class="box"/>
  <text x="845" y="705" class="label">Generated Outputs</text>
  <text x="845" y="730" class="small">Quote PDF</text>
  <text x="845" y="752" class="small">Policy Packet / ID Cards</text>
  <text x="845" y="774" class="small">Attached forms documents</text>

  <!-- Docker compose -->
  <rect x="1160" y="650" width="285" height="180" class="box"/>
  <text x="1185" y="684" class="label">Deployment</text>
  <text x="1185" y="708" class="small">docker compose</text>
  <text x="1185" y="730" class="small">- policy-ui</text>
  <text x="1185" y="752" class="small">- policy-api</text>
  <text x="1185" y="774" class="small">- policy-db</text>
  <text x="1185" y="796" class="small">- policy-cache</text>
  <text x="1185" y="818" class="small">Ports: 5173 / 3300 / 65432 / 6379</text>

  <!-- Batch capability -->
  <rect x="560" y="830" width="860" height="210" class="box"/>
  <text x="585" y="865" class="label">Batch Processing Capability</text>
  <text x="585" y="885" class="small">Scheduled + asynchronous workloads, tenant-scoped, retry-safe</text>

  <rect x="585" y="905" width="170" height="72" class="batch"/>
  <text x="603" y="934" class="label">Scheduler</text>
  <text x="603" y="954" class="small">cron / timed jobs</text>

  <rect x="770" y="905" width="170" height="72" class="batch"/>
  <text x="790" y="934" class="label">Job Queue</text>
  <text x="790" y="954" class="small">durable + retries (outbox)</text>

  <rect x="955" y="905" width="210" height="72" class="batch"/>
  <text x="975" y="934" class="label">Worker Service</text>
  <text x="975" y="954" class="small">batch processors</text>

  <rect x="1180" y="905" width="220" height="72" class="batch"/>
  <text x="1200" y="934" class="label">Job Registry</text>
  <text x="1200" y="954" class="small">run history + status + audit</text>

  <text x="585" y="1005" class="small">Examples: renewals, draft cleanup, recomputation, document pre-generation, exports</text>

  <!-- Arrows -->
  <path d="M290 185 L360 185" class="arrow"/>
  <text x="302" y="172" class="small">HTTP(S)</text>

  <path d="M720 185 L800 185" class="arrow"/>
  <text x="730" y="172" class="small">REST + JWT + X-Tenant</text>

  <path d="M1040 375 L1040 455" class="arrow"/>
  <text x="1052" y="420" class="small">SQL via pg</text>

  <path d="M1110 445 L1110 455" class="arrow"/>
  <text x="1122" y="436" class="small">store AI events</text>

  <path d="M980 355 L935 585" class="arrow"/>
  <text x="900" y="470" class="small">cache get/set</text>

  <path d="M1265 515 L1248 515 L1248 560 L1185 560" class="arrow2"/>
  <text x="1230" y="548" class="small">schema updates</text>

  <path d="M540 480 L1215 230" class="arrow2"/>
  <text x="690" y="405" class="small">rate/coverage definitions</text>

  <path d="M540 625 L1215 320" class="arrow2"/>
  <text x="705" y="560" class="small">tenant rules/preferences</text>

  <path d="M1020 585 L980 670" class="arrow"/>
  <text x="990" y="642" class="small">render + attach</text>

  <path d="M720 235 L855 670" class="arrow"/>
  <text x="760" y="515" class="small">client PDF</text>

  <path d="M1115 730 L1160 730" class="arrow"/>

  <path d="M1005 410 L290 350" class="arrow"/>
  <text x="620" y="365" class="small">send transactional email</text>

  <path d="M1110 375 L1110 830" class="arrow"/>
  <text x="1122" y="610" class="small">enqueue / trigger jobs</text>

  <path d="M670 941 L770 941" class="arrow2"/>
  <path d="M940 941 L955 941" class="arrow2"/>
  <path d="M1165 941 L1180 941" class="arrow2"/>

  <path d="M1060 905 L1040 585" class="arrow2"/>
  <text x="1068" y="760" class="small">read/write</text>

  <path d="M1030 905 L970 790" class="arrow2"/>
  <text x="980" y="848" class="small">generate docs</text>

  <path d="M1060 905 L920 445" class="arrow2"/>
  <text x="1020" y="690" class="small">batch-triggered emails</text>

  <path d="M290 340 L60 185" class="arrow2"/>
  <text x="85" y="280" class="small">delivery to end user inbox</text>

  <!-- Footer -->
  <text x="40" y="1085" class="subtitle">Generated for current repo stack (React + Express + Postgres + batch jobs + email notifications).</text>
</svg>
