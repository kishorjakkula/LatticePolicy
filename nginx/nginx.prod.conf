# Production Nginx reverse proxy
# Handles TLS termination, routes /api/* to policy server,
# everything else to the SPA.
#
# Replace YOUR_DOMAIN with your actual domain and provide certs in ./nginx/certs/

upstream policy_api {
    server server:3000;
    keepalive 32;
}


# Redirect HTTP â†’ HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # TLS â€” update paths to match your certificate files
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Policy API
    location /api/ {
        proxy_pass         http://policy_api/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
        client_max_body_size 30m;
    }

    # Auth endpoints (not under /api/)
    location /auth/ {
        proxy_pass         http://policy_api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
    }

    # Policy server health
    location /health {
        proxy_pass http://policy_api/health;
    }


    # Policy SPA â€” catch-all, serve from frontend container
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # SPA fallback â€” let nginx forward to the frontend which handles try_files
        proxy_intercept_errors off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
